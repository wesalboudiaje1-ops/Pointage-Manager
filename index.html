<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pointage</title>
<style>
body{font-family:Arial;background:#f5f5f5}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:5px;text-align:center}
.total{font-weight:bold;color:#1565c0}
</style>
</head>

<body>

<h3>Tableau de pointage</h3>

<input type="date" id="date" onchange="loadData()">

<table>
<thead>
<tr>
<th>MAT</th>
<th>Nom</th>
<th colspan="2">H1</th>
<th colspan="2">H2</th>
<th colspan="2">H3</th>
<th>Total</th>
</tr>
<tr>
<th></th><th></th>
<th>Entrée</th><th>Sortie</th>
<th>Entrée</th><th>Sortie</th>
<th>Entrée</th><th>Sortie</th>
<th></th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<button onclick="addRow()">Ajouter</button>

<script>
const KEY_EMP = "emp";
const KEY_TIME = "time_";

/* 🔥 دائما 6 خانات فقط */
function emptyTimes(){
  return ["","","","","",""];
}

function calc(times){
  let total = 0;
  for(let i=0;i<6;i+=2){
    let e = times[i];
    let s = times[i+1];
    if(e && s){
      let [eh,em]=e.split(":").map(Number);
      let [sh,sm]=s.split(":").map(Number);
      let diff=(sh*60+sm)-(eh*60+em);
      if(diff>0) total+=diff;
    }
  }
  return total;
}

function format(min){
  if(min===0) return "-";
  let h=Math.floor(min/60);
  let m=min%60;
  return h+"h"+String(m).padStart(2,"0");
}

function getDate(){
  return document.getElementById("date").value;
}

function save(){
  let rows=[...document.querySelectorAll("tr[data-id]")];

  let emps=[];
  let times={};

  rows.forEach(r=>{
    let id=r.dataset.id;

    emps.push({
      mat:r.querySelector(".mat").value,
      nom:r.querySelector(".nom").value
    });

    times[id]=[...r.querySelectorAll("input[type=time]")]
      .map(i=>i.value)
      .slice(0,6); // 🔥 ضمان حذف أي H4
  });

  localStorage.setItem(KEY_EMP,JSON.stringify(emps));
  localStorage.setItem(KEY_TIME+getDate(),JSON.stringify(times));

  updateTotals();
}

function loadData(){
  build();
}

function build(){
  let tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  let emps=JSON.parse(localStorage.getItem(KEY_EMP)||"[]");
  let times=JSON.parse(localStorage.getItem(KEY_TIME+getDate())||"{}");

  emps.forEach((e,i)=>{
    let t=times["r"+i] || emptyTimes();

    // 🔥 تنظيف نهائي
    t = t.slice(0,6);

    let tr=document.createElement("tr");
    tr.dataset.id="r"+i;

    tr.innerHTML=`
    <td><input class="mat" value="${e.mat||""}" onchange="save()"></td>
    <td><input class="nom" value="${e.nom||""}" onchange="save()"></td>

    ${t.map(v=>`<td><input type="time" value="${v}" onchange="save()"></td>`).join("")}

    <td class="total">${format(calc(t))}</td>
    `;

    tbody.appendChild(tr);
  });
}

function addRow(){
  let emps=JSON.parse(localStorage.getItem(KEY_EMP)||"[]");
  emps.push({mat:"",nom:""});
  localStorage.setItem(KEY_EMP,JSON.stringify(emps));
  build();
}

function updateTotals(){
  document.querySelectorAll("tr[data-id]").forEach(tr=>{
    let times=[...tr.querySelectorAll("input[type=time]")]
      .map(i=>i.value)
      .slice(0,6);

    tr.querySelector(".total").innerText = format(calc(times));
  });
}

/* init */
document.getElementById("date").value = new Date().toISOString().split("T")[0];
build();
</script>

</body>
</html>
