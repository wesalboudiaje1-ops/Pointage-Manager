<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Pointage — FKIH BEN SALAH</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding-bottom: 40px; }

    .header { background: #fff; border-bottom: 2px solid #111; padding: 10px 14px 8px; }
    .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .header-title h1 { font-size: 13px; font-weight: 900; letter-spacing: .5px; text-transform: uppercase; color: #111; line-height: 1.3; }
    .header-title .sub { font-size: 10px; color: #555; margin-top: 2px; }
    .header-title .nb  { font-size: 9px; color: #777; margin-top: 2px; font-style: italic; }
    .magasin-badge { background: #e8f0fe; border: 1px solid #90caf9; color: #1565c0; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }

    .meta-bar { background: #fff; border-bottom: 1px solid #ddd; padding: 8px 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 5px; flex: 1; min-width: 130px; }
    .meta-item label { font-size: 11px; font-weight: 700; color: #1565c0; white-space: nowrap; }
    .meta-item input { border: 1px solid #ccc; border-radius: 5px; padding: 4px 7px; font-family: 'Cairo', sans-serif; font-size: 11px; color: #111; background: #fafafa; outline: none; flex: 1; min-width: 0; }
    .meta-item input:focus { border-color: #1565c0; }
    .total-box { background: #e8f0fe; border: 1px solid #90caf9; color: #1565c0; font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 5px; white-space: nowrap; }

    .action-bar { background: #fff; border-bottom: 1px solid #ddd; padding: 8px 14px; display: flex; gap: 8px; }
    .btn { flex: 1; padding: 9px 6px; border-radius: 6px; border: none; font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: .15s; }
    .btn:active { transform: scale(.97); }
    .btn-add { background: #111; color: #fff; }
    .btn-pdf { background: #fff; color: #c62828; border: 1.5px solid #c62828; }

    .search-bar { background: #fff; border-bottom: 2px solid #111; padding: 8px 14px; display: flex; gap: 6px; }
    .search-bar input { flex: 1; border: 1.5px solid #ccc; border-radius: 6px; padding: 8px 12px; font-family: 'Cairo', sans-serif; font-size: 13px; outline: none; color: #111; }
    .search-bar input:focus { border-color: #1565c0; }
    .btn-clr { background: #f0f0f0; border: 1.5px solid #ccc; border-radius: 6px; width: 38px; font-size: 15px; cursor: pointer; color: #555; font-weight: 700; }

    .tbl-wrap { overflow-x: auto; background: #fff; margin: 12px 10px; border: 1.5px solid #111; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 580px; }

    thead th { background: #e8f0fe; color: #1565c0; padding: 8px 5px; text-align: center; font-weight: 700; border: 1px solid #bbb; white-space: nowrap; vertical-align: middle; font-size: 11px; }
    thead th.gh { background: #fff; color: #1565c0; font-size: 10px; border-bottom: 1px solid #bbb; }
    thead th.total-h { background: #e8f0fe; color: #1565c0; font-size: 10px; }
    thead tr.sub th { background: #fafafa; color: #333; font-size: 10px; font-weight: 600; padding: 5px 3px; border: 1px solid #ccc; }
    thead tr.sub th.e { color: #1b5e20; }
    thead tr.sub th.s { color: #b71c1c; }

    tbody tr { border-bottom: 1px solid #ddd; transition: background .1s; }
    tbody tr:nth-child(even) { background: #fafafa; }
    tbody tr:hover { background: #e8f0fe; }
    tbody tr.hl   { background: #fff9c4 !important; }
    tbody tr.hide { display: none; }

    td { padding: 4px 3px; border: 1px solid #ddd; text-align: center; vertical-align: middle; }
    td.nom { text-align: left; padding-left: 6px; min-width: 155px; }
    td.total-cell { font-weight: 700; font-size: 11px; min-width: 64px; white-space: nowrap; }
    td.total-cell.has-time { color: #1565c0; }
    td.total-cell.zero { color: #bbb; }

    td.del-td { width: 50px; padding: 3px; }
    .del-btn { background: #fff0f0; border: 1.5px solid #ffcdd2; border-radius: 5px; cursor: pointer; font-size: 15px; padding: 3px 7px; color: #c62828; transition: .15s; line-height: 1; }
    .del-btn:hover { background: #c62828; color: #fff; border-color: #c62828; }
    .del-btn:active { transform: scale(.9); }

    .mi { width: 68px; border: 1px solid #ccc; border-radius: 3px; padding: 2px 3px; font-family: 'Cairo', sans-serif; font-size: 10px; font-weight: 700; color: #1565c0; text-align: center; background: #fff; outline: none; }
    .ni { width: 100%; border: 1px solid #ccc; border-radius: 3px; padding: 2px 5px; font-family: 'Cairo', sans-serif; font-size: 11px; font-weight: 600; color: #111; background: #fff; outline: none; }
    td input[type="time"] { width: 76px; border: 1px solid #ccc; border-radius: 3px; padding: 2px 3px; font-family: 'Cairo', sans-serif; font-size: 10px; text-align: center; background: #fff; color: #111; outline: none; }
    td input[type="time"]:focus { border-color: #1565c0; }
    input:focus { outline: none; }

    .doc-footer { display: flex; justify-content: space-between; gap: 12px; padding: 12px 16px 4px; margin: 4px 10px 0; }
    .sig { flex: 1; text-align: center; font-size: 10px; color: #555; border-top: 1px solid #111; padding-top: 4px; margin-top: 24px; }

    @media print {
      @page { size: A4 landscape; margin: 8mm; }
      body { background: #fff; }
      .action-bar, .search-bar { display: none; }
      .tbl-wrap { margin: 6px 0; border-radius: 0; }
      td input[type="time"], .mi, .ni { border: none; background: transparent; }
      tbody tr.hide { display: none; }
      thead th, td { font-size: 9px; padding: 3px 2px; }
      .del-td { display: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">
      <h1>Tableau de suivi de pointage</h1>
      <div class="sub">Feuille de présence journalière</div>
      <div class="nb">NB : liste du personnel magasin uniquement (CDI, ANAPEC, Stagiaire)</div>
    </div>
    <div class="magasin-badge">🏪 FKIH BEN SALAH</div>
  </div>
</div>

<div class="meta-bar">
  <div class="meta-item">
    <label>Date :</label>
    <input type="date" id="metaDate" onchange="onDateChange()"/>
  </div>
  <div class="meta-item">
    <label>Jour :</label>
    <input type="text" id="metaJour" readonly style="background:#f0f0f0;color:#1565c0;font-weight:700;cursor:default;"/>
  </div>
  <div class="total-box">👥 <span id="totalPres">0</span></div>
</div>

<div class="action-bar">
  <button class="btn btn-add" onclick="addRow()">➕ Ajouter un employé</button>
  <button class="btn btn-pdf" onclick="exportPDF()">📄 PDF</button>
</div>

<div class="search-bar">
  <input type="text" id="srch" placeholder="🔍  Recherche par nom ou matricule…" oninput="doSearch()"/>
  <button class="btn-clr" onclick="clearSearch()">✕</button>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th rowspan="2" style="min-width:68px">MAT</th>
        <th rowspan="2" style="text-align:left;padding-left:6px;min-width:155px">Nom / Prénom</th>
        <th colspan="2" class="gh">H. 1</th>
        <th colspan="2" class="gh">H. 2</th>
        <th colspan="2" class="gh">H. 3</th>
        <th rowspan="2" class="total-h">⏱ Heures<br/>travaillées</th>
        <th rowspan="2" class="total-h" style="width:50px">🗑</th>
      </tr>
      <tr class="sub">
        <th class="e">Entrée</th><th class="s">Sortie</th>
        <th class="e">Entrée</th><th class="s">Sortie</th>
        <th class="e">Entrée</th><th class="s">Sortie</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="doc-footer">
  <div class="sig">Responsable Magasin</div>
  <div class="sig">Directeur Régional</div>
  <div class="sig">RH / DRH</div>
</div>

<script>
const DEFAULT_EMPLOYEES = [
  {mat:'11110185',nom:'Mr NAFIDI MOHAMED'},
  {mat:'11110197',nom:'Mr AJIL YOUNESS'},
  {mat:'11110150',nom:'Melle AL KHALLOUFI MERIEM'},
  {mat:'11110130',nom:'Mr SANIF ABDELLATIF'},
  {mat:'11110501',nom:'Melle CHAFI FATIMA EZ-ZAHRA'},
  {mat:'11110503',nom:'Mr KEDBANI MOHAMED'},
  {mat:'11110505',nom:'Mr SAQIM ABDELGHANI'},
  {mat:'11110507',nom:'Mr EL-BOUSIYDY MOHAMMED'},
  {mat:'11113500',nom:'Mr TIGHOUART ABDERRAHMAN'},
  {mat:'11113014',nom:'Mr EL MOUTTAKI SOUFIANE'},
  {mat:'11112568',nom:'Mr EL MOUTTAKI SOUFIANE'},
  {mat:'11112012',nom:'Mr BENRADWANE AYOUB'},
  {mat:'11112002',nom:'Mr EL AAOUD MOHAMMED'},
  {mat:'11112004',nom:'Melle LABRINI WIDAD'},
  {mat:'11112005',nom:'Mr GRAFIA HAMZA'},
  {mat:'11112011',nom:'Mr DAOUI BR...'},
  {mat:'11112013',nom:'Mr ENNAG...'},
  {mat:'250',nom:'Melle EL...'},
  {mat:'62',nom:'Mr ES-S...'},
  {mat:'4',nom:'Mr NAO...'},
  {mat:'',nom:'Melle C...'},
  {mat:'',nom:'NABIL'},
  {mat:'',nom:'YOUB'},
  {mat:'',nom:'IZA'},
  {mat:'',nom:'JINE'},
  {mat:'',nom:'JANE'},
  {mat:'',nom:'OUSSAMA'},
  {mat:'',nom:'JAYOUB'},
  {mat:'',nom:'ASMA'},
  {mat:'',nom:'JUI MOHAMED AMINE'},
  {mat:'',nom:'JAWAD'},
  {mat:'',nom:'TIANI RAWTAR'},
  {mat:'',nom:'AKARIA'},
  {mat:'',nom:'YRAN SOFIA'},
  {mat:'',nom:'ARYARHL...'},
];

const EMP_KEY = 'fkbs5_emp'; // مفتاح جديد لتجنب بيانات قديمة

function getTodayISO(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function selectedDate(){ return document.getElementById('metaDate').value || getTodayISO(); }
function timesKey(dateISO){ return `fkbs5_t_${dateISO}`; }

function loadEmp(){
  try {
    const raw = localStorage.getItem(EMP_KEY);
    const p = raw ? JSON.parse(raw) : null;
    return Array.isArray(p) ? p : DEFAULT_EMPLOYEES;
  } catch(e){ return DEFAULT_EMPLOYEES; }
}
function saveEmp(e){ localStorage.setItem(EMP_KEY, JSON.stringify(e)); }

function loadT(dateISO){
  try {
    const raw = localStorage.getItem(timesKey(dateISO));
    const p = raw ? JSON.parse(raw) : {};
    return (p && typeof p === 'object' && !Array.isArray(p)) ? p : {};
  } catch(e){ return {}; }
}
function saveT(d, t){ localStorage.setItem(timesKey(d), JSON.stringify(t)); }

/* ══ 6 عناصر فقط (H1+H2+H3) ══ */
function safeTv(raw){
  if(Array.isArray(raw) && raw.length === 6) return raw;
  if(Array.isArray(raw) && raw.length === 8) return raw.slice(0, 6); // تحويل من النسخة القديمة
  if(raw && Array.isArray(raw.times)) return safeTv(raw.times);
  return Array(6).fill('');
}

function calcMinutes(times6){
  let total = 0;
  for(let i = 0; i < 6; i += 2){
    const e = times6[i], s = times6[i+1];
    if(e && s){
      const [eh,em] = e.split(':').map(Number);
      const [sh,sm] = s.split(':').map(Number);
      const diff = (sh*60+sm) - (eh*60+em);
      if(diff > 0) total += diff;
    }
  }
  return total;
}

function fmtMinutes(min){
  if(min === 0) return '—';
  const h = Math.floor(min/60), m = min%60;
  return `${h}h${m > 0 ? String(m).padStart(2,'0') : '00'}`;
}

function persist(){
  const dateISO = selectedDate();
  const rows = [...document.querySelectorAll('#tbody tr[data-id]')];
  saveEmp(rows.map(r => ({
    mat: r.querySelector('.mi').value,
    nom: r.querySelector('.ni').value,
  })));
  const t = {};
  rows.forEach(r => {
    t[r.dataset.id] = [...r.querySelectorAll('input[type=time]')].map(i => i.value);
  });
  saveT(dateISO, t);
  rows.forEach(r => updateRowTotal(r));
  updateTotal();
}

function updateRowTotal(tr){
  const times = [...tr.querySelectorAll('input[type=time]')].map(i => i.value);
  const mins = calcMinutes(times);
  const cell = tr.querySelector('.total-cell');
  if(cell){
    cell.textContent = fmtMinutes(mins);
    cell.className = 'total-cell ' + (mins > 0 ? 'has-time' : 'zero');
  }
}

function deleteRow(idx){
  const emps = loadEmp();
  emps.splice(idx, 1);
  saveEmp(emps);
  build();
}

function build(){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  const emps = loadEmp();
  const dateISO = selectedDate();
  const timesData = loadT(dateISO);

  emps.forEach((emp, i) => {
    const id = `r${i}`;
    const tv = safeTv(timesData[id]);
    const tr = document.createElement('tr');
    tr.dataset.id = id;

    const ti = tv.map(v => `<td><input type="time" value="${v}" onchange="persist()"/></td>`).join('');
    const mins = calcMinutes(tv);

    tr.innerHTML = `
      <td><input class="mi" value="${emp.mat||''}" placeholder="MAT" onchange="persist()"/></td>
      <td class="nom"><input class="ni" value="${emp.nom||''}" placeholder="Nom & Prenom..." onchange="persist()"/></td>
      ${ti}
      <td class="total-cell ${mins > 0 ? 'has-time' : 'zero'}">${fmtMinutes(mins)}</td>
      <td class="del-td"><button class="del-btn" onclick="deleteRow(${i})" title="حذف">🗑</button></td>
    `;
    tbody.appendChild(tr);
  });
  updateTotal();
}

function updateTotal(){
  const n = [...document.querySelectorAll('#tbody .ni')].filter(i => i.value.trim()).length;
  document.getElementById('totalPres').textContent = n;
}

const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MOIS  = ['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];

function updateJour(){
  const val = document.getElementById('metaDate').value;
  if(!val) return;
  document.getElementById('metaJour').value = JOURS[new Date(val+'T00:00:00').getDay()];
}

function onDateChange(){
  updateJour();
  const timesData = loadT(selectedDate());
  document.querySelectorAll('#tbody tr[data-id]').forEach(tr => {
    const tv = safeTv(timesData[tr.dataset.id]);
    tr.querySelectorAll('input[type=time]').forEach((inp, i) => { inp.value = tv[i] || ''; });
    updateRowTotal(tr);
  });
}

function initDate(){
  document.getElementById('metaDate').value = getTodayISO();
  updateJour();
}

function addRow(){
  const emps = loadEmp();
  emps.push({mat:'', nom:''});
  saveEmp(emps);
  build();
  document.querySelectorAll('#tbody tr').at(-1)?.scrollIntoView({behavior:'smooth', block:'center'});
}

function doSearch(){
  const q = document.getElementById('srch').value.trim().toLowerCase();
  document.querySelectorAll('#tbody tr[data-id]').forEach(tr => {
    const m = tr.querySelector('.mi')?.value.toLowerCase() || '';
    const n = tr.querySelector('.ni')?.value.toLowerCase() || '';
    const hit = !q || m.includes(q) || n.includes(q);
    tr.classList.toggle('hide', !hit);
    tr.classList.toggle('hl', !!(q && hit));
  });
}
function clearSearch(){ document.getElementById('srch').value = ''; doSearch(); }

function exportPDF(){
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
  const dateVal = selectedDate(), jourVal = document.getElementById('metaJour').value;
  const d = new Date(dateVal+'T00:00:00');
  const dateStr = `${d.getDate()} ${MOIS[d.getMonth()]} ${d.getFullYear()}`;

  doc.setFillColor(232,240,254); doc.rect(0,0,297,14,'F');
  doc.setDrawColor(0); doc.setLineWidth(0.5); doc.line(0,14,297,14);
  doc.setTextColor(21,101,192); doc.setFontSize(12); doc.setFont('helvetica','bold');
  doc.text('TABLEAU DE SUIVI DE POINTAGE MANUEL',148.5,6,{align:'center'});
  doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(80);
  doc.text('NB : liste du personnel magasin uniquement (CDI, ANAPEC, Stagiaire)',148.5,11,{align:'center'});
  doc.setTextColor(21,101,192); doc.setFont('helvetica','bold'); doc.setFontSize(8);
  doc.text('FKIH BEN SALAH',285,8,{align:'right'});
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(0);
  doc.text(`Date : ${dateStr}          Jour : ${jourVal}`,14,20);
  doc.setDrawColor(180); doc.setLineWidth(0.3); doc.line(0,23,297,23);

  const rows = [...document.querySelectorAll('#tbody tr[data-id]')].filter(r => !r.classList.contains('hide'));
  const body = rows.map(r => {
    const mat   = r.querySelector('.mi')?.value || '';
    const nom   = r.querySelector('.ni')?.value || '';
    const times = [...r.querySelectorAll('input[type=time]')].map(t => t.value || '');
    return [mat, nom, ...times, fmtMinutes(calcMinutes(times))];
  });

  doc.autoTable({
    startY: 25,
    head:[[
      {content:'MAT',rowSpan:2,styles:{halign:'center',fillColor:[232,240,254],textColor:[21,101,192]}},
      {content:'Nom / Prenom',rowSpan:2,styles:{halign:'left',fillColor:[232,240,254],textColor:[21,101,192]}},
      {content:'H.1',colSpan:2,styles:{halign:'center',fillColor:[232,240,254],textColor:[21,101,192]}},
      {content:'H.2',colSpan:2,styles:{halign:'center',fillColor:[232,240,254],textColor:[21,101,192]}},
      {content:'H.3',colSpan:2,styles:{halign:'center',fillColor:[232,240,254],textColor:[21,101,192]}},
      {content:'Heures',rowSpan:2,styles:{halign:'center',fillColor:[232,240,254],textColor:[21,101,192]}},
    ],[
      {content:'Entree',styles:{fillColor:[245,255,245],textColor:[27,94,32]}},
      {content:'Sortie',styles:{fillColor:[255,245,245],textColor:[183,28,28]}},
      {content:'Entree',styles:{fillColor:[245,255,245],textColor:[27,94,32]}},
      {content:'Sortie',styles:{fillColor:[255,245,245],textColor:[183,28,28]}},
      {content:'Entree',styles:{fillColor:[245,255,245],textColor:[27,94,32]}},
      {content:'Sortie',styles:{fillColor:[255,245,245],textColor:[183,28,28]}},
    ]],
    body: body,
    styles:{fontSize:7.5, cellPadding:1.8, lineColor:[180,180,180], lineWidth:0.25, textColor:[0,0,0]},
    headStyles:{fontStyle:'bold', fontSize:7.5},
    alternateRowStyles:{fillColor:[248,251,255]},
    columnStyles:{
      0:{cellWidth:22,halign:'center'},
      1:{cellWidth:55,halign:'left'},
      2:{cellWidth:19,halign:'center'},3:{cellWidth:19,halign:'center'},
      4:{cellWidth:19,halign:'center'},5:{cellWidth:19,halign:'center'},
      6:{cellWidth:19,halign:'center'},7:{cellWidth:19,halign:'center'},
      8:{cellWidth:24,halign:'center',fontStyle:'bold',textColor:[21,101,192]},
    },
    margin:{left:7, right:7},
  });

  const fy = doc.lastAutoTable.finalY + 12;
  if(fy < 198){
    doc.setLineWidth(0.4); doc.setDrawColor(0);
    [[50,'Responsable Magasin'],[148.5,'Directeur Regional'],[247,'RH / DRH']].forEach(([x,s]) => {
      doc.line(x-28,fy,x+28,fy);
      doc.setFontSize(7); doc.setTextColor(80);
      doc.text(s, x, fy+5, {align:'center'});
    });
  }
  doc.setFillColor(21,101,192); doc.rect(0,202,297,3,'F');
  doc.save(`Pointage_FKIH_${dateVal}.pdf`);
}

initDate();
build();
</script>
</body>
</html>
